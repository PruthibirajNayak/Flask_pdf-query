<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Query with DeepSeek R1.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h2 class="text-center mb-4">PDF Query with DeepSeek R1.5</h2>
                    <form id="uploadForm">
                        <div class="mb-3">
                            <label for="file" class="form-label">Upload PDF</label>
                            <input type="file" class="form-control" id="file" accept=".pdf" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Upload</button>
                    </form>
                    <hr>
                    <div class="mb-3">
                        <label for="query" class="form-label">Ask a Question</label>
                        <input type="text" class="form-control" id="query" placeholder="Enter your question" required>
                    </div>
                    <button id="queryBtn" class="btn btn-primary w-100">Submit Query</button>
                    <div id="response" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('file');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (response.ok) {
                alert(result.message);
            } else {
                alert(result.error);
            }
        });

        document.getElementById('queryBtn').addEventListener('click', async () => {
            const query = document.getElementById('query').value;
            const fileInput = document.getElementById('file');
            if (!fileInput.files[0] || !query) {
                alert('Please upload a file and enter a query.');
                return;
            }

            const response = await fetch('/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    query: query,
                    filename: fileInput.files[0].name
                })
            });
            const result = await response.json();
            const responseDiv = document.getElementById('response');
            if (response.ok) {
                responseDiv.innerHTML = `<div class="alert alert-success">${result.response}</div>`;
            } else {
                responseDiv.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
            }
        });
    </script>
</body>
</html>
